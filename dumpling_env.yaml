name: dumpling_env
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.13
  - snakemake>=8.0
  - snakemake-wrapper-utils
  - pandas
  - biopython
  - fastqc
  - samtools
  - bbmap=39.13
  - minimap2
  - gatk4>=4.5.0.0
  - regex
  - pip
  - pip:
      - multiqc>=1.25
      - regex
      # MAVE-HGVS validator used by workflow/rules/scripts/format_mavedb.py
      # to catch malformed variants before MaveDB deposit. Not on conda
      # (verified 2026-05-26).
      - mavehgvs
