channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # Pin to R 4.5.x to match renv.lock's declared R version. R 4.6
  # (released 2026-04-24) broke source compiles of rlang/S7/yaml
  # and via cascade ~half the lockfile. Bump in lockstep with
  # renv.lock's "R": "Version" and the matching r-apt pin in
  # .devcontainer/devcontainer.json.
  - r-base=4.5
  - r-nloptr
  - nlopt
  - libxml2
  # cmake must be <3.25: CmdStan's build system uses cmake_minimum_required()
  # with policies incompatible with the 3.25+ behavior change (CMP0135).
  - cmake <3.25
  - zlib
