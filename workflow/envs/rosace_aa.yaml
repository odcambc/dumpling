channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # System layer for rosace-aa: same R + CmdStan toolchain as rosace.yaml.
  # The R-side install (rosace-aa + cmdstanr + Bioconductor `impute` +
  # transitive deps) is handled by install_rosace_aa.R via renv::restore()
  # + renv::install("pimentellab/rosace-aa@<sha>").
  - r-base
  - r-nloptr
  - nlopt
  - libxml2
  # cmake must be <3.25 for CmdStan compatibility (CMP0135 policy change
  # in cmake 3.25 breaks CmdStan's build).
  - cmake <3.25
  - zlib
